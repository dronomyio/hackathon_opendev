server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy WebSocket /ws → backend on port 8008
    # This means the dashboard can use ws://<host>/ws (same origin)
    # without needing VITE_WS_URL baked in at build time.
    location /ws {
        proxy_pass http://host.docker.internal:8008/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Serve React SPA — all other routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

